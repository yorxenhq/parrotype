# Deploy docs/site/ to GitHub Pages.
# Branch-mode Pages only serves / or /docs, so we deploy the subfolder
# as an artifact instead. Enable: repo Settings -> Pages -> Source: GitHub Actions.
name: pages

on:
  push:
    branches: [main]
    paths: ["docs/site/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site
      - id: deployment
        uses: actions/deploy-pages@v4
